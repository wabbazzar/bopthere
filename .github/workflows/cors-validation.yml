name: CORS and Auth Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'server/**'
      - '.env*'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'server/**'
      - '.env*'

jobs:
  cors-validation:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Test BopThere API Health
      run: |
        API_URL="https://api.bopthere.com"

        echo "Testing API health..."
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")

        if [ "$STATUS" = "200" ]; then
          echo "API is healthy (status: $STATUS)"
        else
          echo "API health check failed (status: $STATUS)"
          exit 1
        fi

    - name: Test Auth Endpoints
      run: |
        API_URL="https://api.bopthere.com"

        # Test login endpoint exists (should return 422 for missing body, not 404)
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/auth/login" \
          -H "Content-Type: application/json" \
          -d '{"username":"test","password":"test"}')

        if [ "$STATUS" = "404" ]; then
          echo "Auth login endpoint not found!"
          exit 1
        else
          echo "Auth login endpoint accessible (status: $STATUS)"
        fi

        # Test verify endpoint exists
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$API_URL/auth/verify" \
          -H "Content-Type: application/json")

        if [ "$STATUS" = "404" ]; then
          echo "Auth verify endpoint not found!"
          exit 1
        else
          echo "Auth verify endpoint accessible (status: $STATUS)"
        fi

    - name: Validate Frontend Build
      run: |
        npm ci
        npm run build
      env:
        PUBLIC_API_GATEWAY_URL: https://api.bopthere.com
        PUBLIC_CHAT_API_URL: https://api.bopthere.com

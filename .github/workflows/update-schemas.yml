name: Update API Schemas

on:
  # Manual trigger
  workflow_dispatch:
  
  # Run on push to main
  push:
    branches: [ main ]
    paths:
      - 'infrastructure/**/*.tf'
      - 'aws/lambda/**/*.py'
      - '.github/workflows/update-schemas.yml'
  
  # Run weekly on Sundays at 2 AM UTC
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write
  pull-requests: write

env:
  AWS_REGION: us-west-2
  PYTHON_VERSION: '3.11'

jobs:
  update-schemas:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3
      
      - name: Create schema directory
        run: mkdir -p .wedding/context
      
      - name: Generate DynamoDB schemas
        run: |
          python scripts/generate_dynamodb_schemas.py
      
      - name: Extract API Gateway routes
        run: |
          python scripts/extract_api_gateway_routes.py
      
      - name: Extract Lambda patterns
        run: |
          python scripts/extract_lambda_patterns.py
      
      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet HEAD -- .wedding/context/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No schema changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changes detected"
          fi
      
      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update API schemas and documentation"
          title: "chore: update API schemas and documentation"
          body: |
            ## Automated Schema Update

            This PR updates the API schemas based on the current infrastructure state.

            ### Changes included:
            - DynamoDB table schemas
            - API Gateway endpoint documentation
            - Lambda function patterns

            ### Files updated:
            - `.wedding/context/dynamodb-schemas.json`
            - `.wedding/context/api-endpoints.md`
            - `.wedding/context/lambda-patterns.json`

            **Note**: This is an automated update. Please review the changes before merging.
          branch: update-schemas-${{ github.run_number }}
          delete-branch: true
          labels: |
            documentation
            automated

  test-field-consistency:
    needs: update-schemas
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest
      
      - name: Run field consistency tests
        run: |
          python -m pytest tests/test_api_field_consistency.py -v
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-consistency-results
          path: |
            .pytest_cache/
            **/__pycache__/

  update-documentation:
    needs: update-schemas
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate documentation summary
        run: |
          if [ -f .wedding/context/api-endpoints.md ]; then
            echo "### API Documentation Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following API documentation has been updated:" >> $GITHUB_STEP_SUMMARY
            echo "- DynamoDB schemas" >> $GITHUB_STEP_SUMMARY
            echo "- API Gateway endpoints" >> $GITHUB_STEP_SUMMARY
            echo "- Lambda function patterns" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View the full documentation in \`.wedding/context/\`" >> $GITHUB_STEP_SUMMARY
          fi

  notify-on-failure:
    needs: [update-schemas, test-field-consistency]
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
      - name: Notify failure
        run: |
          echo "## ❌ Schema Update Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The automated schema update has failed. Please check the logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- AWS credentials may be incorrect" >> $GITHUB_STEP_SUMMARY
          echo "- API Gateway or DynamoDB resources may not exist" >> $GITHUB_STEP_SUMMARY
          echo "- Python scripts may have errors" >> $GITHUB_STEP_SUMMARY

  validate-schemas:
    needs: update-schemas
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pytest jsonschema
      
      - name: Create validation script
        run: |
          cat > validate_schemas.py << 'EOF'
          import json
          import jsonschema
          from pathlib import Path
          
          schema_file = Path(".wedding/context/dynamodb-schemas.json")
          if schema_file.exists():
              with open(schema_file) as f:
                  data = json.load(f)
              
              # Validate structure
              assert "schemas" in data, "Missing schemas key"
              assert "metadata" in data, "Missing metadata key"
              
              for table_name, schema in data["schemas"].items():
                  print(f"Validating schema for {table_name}...")
                  # Validate it is a valid JSON Schema
                  jsonschema.Draft7Validator.check_schema(schema)
              
              print("✅ All schemas are valid!")
          else:
              print("⚠️  No schema file found to validate")
          EOF
      
      - name: Validate JSON schemas
        run: |
          echo "Validating generated JSON schemas..."
          python validate_schemas.py
      
      - name: Create summary script
        run: |
          cat > create_summary.py << 'EOF'
          import json
          from pathlib import Path
          
          schema_file = Path(".wedding/context/dynamodb-schemas.json")
          if schema_file.exists():
              with open(schema_file) as f:
                  data = json.load(f)
              
              print("### DynamoDB Schema Summary")
              print("")
              print(f"**Total Tables**: {len(data['schemas'])}")
              print("")
              print("#### Tables:")
              for table_name, schema in data["schemas"].items():
                  properties = schema.get("properties", {})
                  print(f"- **{table_name}**: {len(properties)} fields")
              
              print("")
              print(f"**Generated at**: {data['metadata']['generated_at']}")
          EOF
      
      - name: Display schema summary
        run: |
          if [ -f .wedding/context/dynamodb-schemas.json ]; then
            python create_summary.py >> $GITHUB_STEP_SUMMARY
          fi
name: Deploy to GitHub Pages (prod)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    name: Build (prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject build id into service worker
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "self.__BUILD_ID__='${SHORT_SHA}';" | cat - public/service-worker.js > public/service-worker.js.tmp
          mv public/service-worker.js.tmp public/service-worker.js

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_GATEWAY_URL: ${{ secrets.VITE_API_GATEWAY_URL }}

      - name: Ensure SPA fallback (404.html)
        run: |
          cp dist/index.html dist/404.html

      - name: Include CNAME if present
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
[tool:pytest]
# Pytest configuration for smoke tests

# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    smoke: Critical smoke tests for API Gateway → Lambda → DynamoDB flow
    integration: Integration tests that can run without full AWS deployment
    slow: Tests that take longer than normal to execute
    auth: Authentication service tests
    rsvp: RSVP service tests
    leaderboard: Leaderboard service tests
    chain: Complete service chain tests

# Output configuration
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Timeout settings
timeout = 300
timeout_method = thread

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:requests.*